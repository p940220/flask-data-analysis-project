<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>專題：動態爬蟲與數學分析</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; padding: 50px; }
        .result-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1 ); }
        .type-badge { font-size: 1.5rem; padding: 10px 20px; border-radius: 50px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="result-card text-center mb-5">
            <h1 class="mb-4">📊 專題分析結果</h1>
            <p class="lead">根據 Dcard 心情版數據分析，該群體屬於：</p>
            <div class="mb-3">
                <span class="badge bg-primary type-badge">{{ label }}</span>
            </div>
            <p class="text-muted">數學指標 (變異係數 CV): <strong>{{ cv_score }}</strong></p>
        </div>

        <div class="table-responsive">
            <table class="table table-hover bg-white rounded shadow-sm">
                <thead class="table-dark">
                    <tr>
                        <th>標題</th>
                        <th>按讚數</th>
                        <th>抓取時間</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in data %}
                    <tr>
                        <td>{{ item.title }}</td>
                        <td><span class="badge bg-info text-dark">{{ item.like_count }}</span></td>
                        <td>{{ item.crawl_date }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
